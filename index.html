        aggiungiSottopunto(id);

    function allegaDocumento(idArgomento) {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.pdf,.doc,.docx,.dot,.dotx,.rtf,.txt,.csv,.xls,.xlsx,.xlsm,.xlt,.xltx,.ppt,.pptx,.pot,.potx,.pps,.ppsx,.odt,.ods,.odp,.odg,.odf,.pages,.numbers,.keynote,.zip,.rar,.7z,.tar,.gz,.jwpub,.jw,.jpg,.jpeg,.png,.gif,.webp,.bmp,.tiff,.svg';
    input.onchange = e => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = event => {
            const contenitore = document.getElementById(idArgomento).querySelector('.fonti-container');
            const fileData = event.target.result;
            const fileName = file.name;
            
            const itemHtml = `
                <div class="allegato-item" data-filedata="${fileData}" data-filename="${fileName}" 
                     style="display:inline-flex; align-items:center; background:#e3f2fd; padding:2px 8px; border-radius:10px; font-size:8pt; border:1px solid #2196f3; color:#1565c0;">
                    ${['jpg','jpeg','png','gif','webp'].includes(fileName.split('.').pop().toLowerCase())? '🖼️' : '📄'} ${fileName} 
                    <span style="cursor:pointer; color:#c62828; margin-left:8px; font-weight:bold;" onclick="this.parentElement.remove()">✕</span>
                </div>`;
            contenitore.insertAdjacentHTML('beforeend', itemHtml);
        };
        reader.readAsDataURL(file);
    };
    input.click();
}


    function spostaCard(id, direzione) {
        const contenitore = document.getElementById('contenitore-argomenti');
        const card = document.getElementById(id);
        const cards = Array.from(contenitore.querySelectorAll(':scope > .arg-card'));
        const idx = cards.indexOf(card);
        const nuovoIdx = idx + direzione;
        if (nuovoIdx < 0 || nuovoIdx >= cards.length) return;
        if (direzione === -1) {
            contenitore.insertBefore(card, cards[nuovoIdx]);
        } else {
            contenitore.insertBefore(card, cards[nuovoIdx].nextSibling);
        }
    }

document.addEventListener('click', function(e) {

        popup.style.cssText = `

            display:flex; align-items:center; justify-content:center;`;
        popup.innerHTML = `
            <div style="background:white; border-radius:12px; padding:24px; width:280px; text-align:center; box-shadow:0 8px 30px rgba(0,0,0,0.2);">
                <div style="font-size:11pt; font-weight:bold; margin-bottom:6px;">📄 ${name}</div>
                <div style="font-size:9pt; color:#888; margin-bottom:20px;">Cosa vuoi fare?</div>
                <div style="display:flex; gap:10px; justify-content:center;">
                    <button id="btn-visualizza" style="padding:8px 18px; background:#1565C0; color:white; border:none; border-radius:8px; font-size:10pt; cursor:pointer;">👁 Visualizza</button>
                    <button id="btn-scarica" style="padding:8px 18px; background:#e8f5e9; color:#2e7d32; border:1px solid #2e7d32; border-radius:8px; font-size:10pt; cursor:pointer;">⬇ Scarica</button>
                </div>
                <div style="margin-top:12px;">
                    <button id="btn-annulla" style="background:none; border:none; color:#aaa; font-size:9pt; cursor:pointer;">Annulla</button>
                </div>
            </div>`;
        document.body.appendChild(popup);

        popup.querySelector('#btn-visualizza').onclick = () => {
            document.body.removeChild(popup);
            const win = window.open('', '_blank');
            const ext = name.split('.').pop().toLowerCase();
            if (ext === 'pdf') {
                win.location.href = base64;
            } else if (['jpg','jpeg','png','gif','webp'].includes(ext)) {
                win.document.write(`<img src="${base64}" style="max-width:100%;display:block;margin:auto;" />`);
            } else if (ext === 'txt') {
                const testo = atob(base64.split(',')[1]);
                win.document.write(`<pre style="font-family:sans-serif;padding:20px;">${testo}</pre>`);
            } else {
                win.document.write(`<p style="font-family:sans-serif;padding:20px;">Anteprima non disponibile per questo tipo di file.<br><a href="${base64}" download="${name}">Scarica il file</a></p>`);
            }
        };

        popup.querySelector('#btn-scarica').onclick = () => {
            document.body.removeChild(popup);
            const link = document.createElement('a');
            link.href = base64;
            link.download = name;
            link.click();
        };

        popup.querySelector('#btn-annulla').onclick = () => {
            document.body.removeChild(popup);
        };

        // Chiudi cliccando fuori
        popup.addEventListener('click', function(ev) {
            if (ev.target === popup) document.body.removeChild(popup);
        });
    }
});

function gestisciTabella(azione) {
    if (!tabellaAttiva || !cellaAttiva) return;
    
    const rowIndex = cellaAttiva.parentElement.rowIndex;
    const colIndex = cellaAttiva.cellIndex;

    switch(azione) {
        case 'add-row':
            // Inserisce una riga dopo quella attuale
            const newRow = tabellaAttiva.insertRow(rowIndex + 1);
            const colCount = tabellaAttiva.rows[0].cells.length;
            for (let i = 0; i < colCount; i++) {
                const newCell = newRow.insertCell(i);
                newCell.innerHTML = "[]";
                newCell.style.border = "1px solid #ccc";
                newCell.style.padding = "5px";
            }
            break;

        case 'add-col':
            // Inserisce una colonna dopo quella attuale in tutte le righe
            Array.from(tabellaAttiva.rows).forEach((row, rIdx) => {
                const newCell = row.insertCell(colIndex + 1);
                newCell.innerHTML = rIdx === 0 ? "[]" : "";
                newCell.style.border = "1px solid #ccc";
                newCell.style.padding = "5px";
                if (rIdx === 0) {
                    newCell.style.textAlign = "center";
                    newCell.style.fontWeight = "bold";
                    newCell.style.background = "#f2f2f2";
                }
            });
            break;

        case 'del-row':
            if (tabellaAttiva.rows.length > 1) {
                tabellaAttiva.deleteRow(rowIndex);
                document.getElementById('table-menu').style.display = 'none';
            } else {
                alert("Usa 'Elimina' per rimuovere l'intera tabella.");
            }
            break;

        case 'del-col':
            if (tabellaAttiva.rows[0].cells.length > 1) {
                Array.from(tabellaAttiva.rows).forEach(row => {
                    row.deleteCell(colIndex);
                });
                document.getElementById('table-menu').style.display = 'none';
            } else {
                alert("Impossibile eliminare l'ultima colonna.");
            }
            break;

        case 'delete':
            if (confirm("Eliminare l'intera tabella?")) {
                tabellaAttiva.remove();
                document.getElementById('table-menu').style.display = 'none';
                tabellaAttiva = null;
            }
            break;
    }
}

    function generaPDFProgrammatico() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const pageWidth = 210;
    const margin = 14;
    const contentWidth = pageWidth - (margin * 2);

    const congregazione = (document.getElementById('nome-congregazione').value || '').trim();
    const inputsHeader = document.querySelectorAll('#paper > .row input');
    const dataAdunanza = inputsHeader[0]?.value || '---';
    const luogo = inputsHeader[1]?.value || '---';
    
    const inputsDettagli = document.querySelectorAll('#paper > .row:nth-of-type(2) input');
    const pregIniziale = inputsDettagli[0]?.value || '---';
    const pregFinale = inputsDettagli[1]?.value || '---';
    const relatore = inputsDettagli[2]?.value || '---';

    
    doc.setFontSize(16);
    doc.setTextColor(0, 0, 0);
    doc.setFont(undefined, 'bold');
    // Rispetta i \n del textarea + splitTextToSize per righe lunghe
    const righeManual = congregazione.toUpperCase().split('\n');
    let titoloLines = [];
    righeManual.forEach(r => {
        const split = doc.splitTextToSize(r || ' ', contentWidth);
        titoloLines = titoloLines.concat(split);
    });
    const lineaH = 7;
    const titoloH = titoloLines.length * lineaH;
    const bandaH = titoloH + 12;
    const spazioDopoB = 10; // spazio bianco fisso tra banda e data

    doc.setFillColor(240, 242, 245);
    doc.rect(0, 0, pageWidth, bandaH, 'F');
    const yTitolo = (bandaH - titoloH) / 2 + lineaH;
    doc.text(titoloLines, pageWidth / 2, yTitolo, { align: 'center', lineHeightFactor: 1.3 });
    const yBase = bandaH + spazioDopoB;
    const rH = 8; // altezza riga
    const sepColor = [200, 200, 200];

    // Riga 1 — DATA
    doc.setFontSize(8);
    doc.setFont(undefined, 'bold');
    doc.setTextColor(0, 0, 0);
    doc.text('DATA:', pageWidth / 2 - doc.getTextWidth('DATA:  ' + dataAdunanza) / 2, yBase);
    doc.setFont(undefined, 'normal');
    doc.text(dataAdunanza, pageWidth / 2 - doc.getTextWidth('DATA:  ' + dataAdunanza) / 2 + doc.getTextWidth('DATA:  '), yBase);

    doc.setDrawColor(...sepColor);
    doc.setLineWidth(0.2);
    doc.line(margin, yBase + 2, pageWidth - margin, yBase + 2);

    // Riga 2 — LUOGO
    const yR2 = yBase + rH;
    doc.setFont(undefined, 'bold');
    doc.text('LUOGO:', pageWidth / 2 - doc.getTextWidth('LUOGO:  ' + luogo) / 2, yR2);
    doc.setFont(undefined, 'normal');
    doc.text(luogo, pageWidth / 2 - doc.getTextWidth('LUOGO:  ' + luogo) / 2 + doc.getTextWidth('LUOGO:  '), yR2);

    doc.setDrawColor(...sepColor);
    doc.setLineWidth(0.2);
    doc.line(margin, yR2 + 2, pageWidth - margin, yR2 + 2);

    // Riga 3 — PREGHIERE e RELATORE centrati dinamicamente
    const yR3 = yR2 + rH;
    doc.setFont(undefined, 'bold');
    const wPI = doc.getTextWidth('PREG. INIZIALE: ');
    const wPF = doc.getTextWidth('PREG. FINALE: ');
    const wRE = doc.getTextWidth('RELATORE: ');
    doc.setFont(undefined, 'normal');
    const wPIval = doc.getTextWidth(pregIniziale);
    const wPFval = doc.getTextWidth(pregFinale);
    const wREval = doc.getTextWidth(relatore);
    const totale = wPI + wPIval + 10 + wPF + wPFval + 10 + wRE + wREval;
    let xR3 = (pageWidth - totale) / 2;
    doc.setFont(undefined, 'bold');
    doc.text('PREG. INIZIALE: ', xR3, yR3);
    doc.setFont(undefined, 'normal');
    doc.text(pregIniziale, xR3 + wPI, yR3);
    xR3 += wPI + wPIval + 10;
    doc.setFont(undefined, 'bold');
    doc.text('PREG. FINALE: ', xR3, yR3);
    doc.setFont(undefined, 'normal');
    doc.text(pregFinale, xR3 + wPF, yR3);
    xR3 += wPF + wPFval + 10;
    doc.setFont(undefined, 'bold');
    doc.text('RELATORE: ', xR3, yR3);
    doc.setFont(undefined, 'normal');
    doc.text(relatore, xR3 + wRE, yR3);

    let yPos = yR3 + 10;

    const checkSpace = (needed) => {
        if (yPos + needed > 275) {
            doc.addPage();
            yPos = 20;
            return true;
        }
        return false;
    };

        const argomenti = document.querySelectorAll('.arg-card');
    argomenti.forEach((arg, index) => {
        const titolo = arg.querySelector('.title-line input').value || 'Senza Titolo';
        const info = arg.querySelectorAll('.row input');
        const fonti = info[0]?.value || '';
        const incaricato = info[1]?.value || '';
        const minuti = info[2]?.value || '';
        
        const allegati = Array.from(arg.querySelectorAll('.allegato-item'))
                              .map(a => a.getAttribute('data-filename'))
                              .join(', ');

        // Stima altezza primo sub-box (sottotitolo + testo decisione)
        const primoSub = arg.querySelector('.sub-box');
        const altezzaPrimoSub = primoSub ? 35 : 0;
        checkSpace(35 + altezzaPrimoSub); // Intestazione + primo sub-box ancorato

        // Sfondo azzurrino per l'intestazione dell'argomento
        doc.setDrawColor(200, 200, 200);
        doc.setFillColor(245, 247, 250);
        doc.roundedRect(margin, yPos, contentWidth, 24, 2, 2, 'FD');

        doc.setFontSize(11);
        doc.setTextColor(21, 101, 192); // Blu
        doc.setFont("helvetica", "bold");
        doc.text(`${index + 1}. ${titolo.toUpperCase()}`, margin + 5, yPos + 8);

        doc.setFontSize(8);
        doc.setTextColor(100, 100, 100);
        doc.setFont("helvetica", "normal");
        doc.text(`FONTI: ${fonti}`, margin + 5, yPos + 17, { maxWidth: contentWidth * 0.60 });
        doc.text(`DA: ${incaricato}`, margin + (contentWidth * 0.70), yPos + 17);
        doc.text(`MIN: ${minuti}`, margin + (contentWidth * 0.90), yPos + 17);

       

        yPos += 30;

        const subs = arg.querySelectorAll('.sub-box');
        subs.forEach((sub, subIndex) => {
    if (subIndex > 0) checkSpace(20);
    const yInizioSub = yPos;
    yPos += 5; // padding interno superiore
            // 1. Sottotitolo
            const sottotitolo = sub.querySelector('input').value;
            if (sottotitolo) {
                doc.setFont("helvetica", "bold");
                doc.setFontSize(10);
                doc.setTextColor(50, 50, 50);
                doc.text(sottotitolo.toUpperCase(), margin + 5, yPos);
                yPos += 8;
            }

            // 2. Contenuto Decisione (Testo, Tabelle, Immagini)
            const areaDecisione = sub.querySelector('div[contenteditable="true"]');
            if (areaDecisione) {
                const nodes = Array.from(areaDecisione.childNodes);
                let currentTextGroup = document.createElement('div');

                const flushText = () => {
                    if (currentTextGroup.childNodes.length > 0) {
                        doc.setFontSize(10);
                        yPos = stampaTestoInline(doc, currentTextGroup, 25, yPos, 160);
                        currentTextGroup = document.createElement('div');
                    }
                };

                nodes.forEach(node => {
                    if (node.nodeName === 'TABLE') {
                        flushText();
                        checkSpace(20);
                        doc.autoTable({
                            html: node,
                            startY: yPos,
                            margin: { left: margin + 10 },
                            tableWidth: contentWidth - 15,
                            theme: 'grid',
                            styles: { fontSize: 8, cellPadding: 2 },
                            headStyles: { fillColor: [240, 242, 245] },
                            didParseCell: function(data) {
                                const raw = data.cell.raw;
                                if (!raw || typeof raw.querySelector !== 'function') return;
                                const hasBold = raw.querySelector('b, strong');
                                const hasItalic = raw.querySelector('i, em');
                                if (hasBold && hasItalic) data.cell.styles.fontStyle = 'bolditalic';
                                else if (hasBold) data.cell.styles.fontStyle = 'bold';
                                else if (hasItalic) data.cell.styles.fontStyle = 'italic';
                                const fontTag = raw.querySelector('font[color]');
                                if (fontTag) {
                                    const hex = fontTag.getAttribute('color');
                                    data.cell.styles.textColor = [parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16)];
                               } else if (raw.querySelector('a[href]') && !raw.querySelector('font[color]')) {
                                    data.cell.styles.textColor = [25, 100, 192];
                                } else if (raw.style && raw.style.color) {
                                    const m = raw.style.color.match(/\d+/g);
                                    if (m) data.cell.styles.textColor = [parseInt(m[0]),parseInt(m[1]),parseInt(m[2])];
                                }
                            },
                            didDrawCell: function(data) {
                                const raw = data.cell.raw;
                                if (!raw || typeof raw.querySelector !== 'function') return;
                                if (raw.querySelector('u')) {
                                    const x = data.cell.x + data.cell.padding('left');
                                    const y = data.cell.y + data.row.height - data.cell.padding('bottom') - 0.5;
                                    const testoU = raw.querySelector('u').textContent || '';
                                    doc.setFontSize(data.cell.styles.fontSize || 8);
                                    const w = doc.getTextWidth(testoU);
                                    const ft = raw.querySelector('font[color]');
                                    if (ft) { const h=ft.getAttribute('color'); doc.setDrawColor(parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)); }
                                    else doc.setDrawColor(0,0,0);
                                    doc.setLineWidth(0.2);
                                    doc.line(x, y, x + w, y);
                                }
                                const linkTag = raw.querySelector('a[href]');
                                if (linkTag) {
                                    const x2 = data.cell.x + data.cell.padding('left');
                                    const y2 = data.cell.y + data.row.height - data.cell.padding('bottom') - 0.5;
                                    doc.setFontSize(data.cell.styles.fontSize || 8);
                                    const w2 = doc.getTextWidth(linkTag.textContent || '');
                                    doc.setDrawColor(25, 100, 192);
                                    doc.setLineWidth(0.2);
                                    doc.line(x2, y2, x2 + w2, y2);
                                    doc.link(data.cell.x+data.cell.padding('left'), data.cell.y+data.cell.padding('top'), data.cell.width-data.cell.padding('left')-data.cell.padding('right'), data.row.height-data.cell.padding('top')-data.cell.padding('bottom'), { url: linkTag.getAttribute('href') });
                                }
                            }
                        });
                        yPos = doc.lastAutoTable.finalY + 5;
                    } 
                    else if (node.nodeName === 'IMG') {
                        flushText();
                        const imgWidth = 80; 
                        const imgHeight = (node.naturalHeight * imgWidth) / node.naturalWidth || 50;
                        checkSpace(imgHeight + 5);
                        try {
                            doc.addImage(node.src, 'JPEG', margin + 10, yPos, imgWidth, imgHeight);
                            yPos += imgHeight + 5;
                        } catch (e) { console.error("Errore immagine PDF:", e); }
                    } 
                    else {
                        currentTextGroup.appendChild(node.cloneNode(true));
                    }
                });
                flushText();
            }
            // Disegna il bordo intorno al sottopunto già stampato
            doc.setDrawColor(52, 152, 219);
            doc.setLineWidth(0.3);
            doc.roundedRect(margin, yInizioSub, contentWidth, yPos - yInizioSub + 6, 1, 1, 'S');
            yPos += 10;
        });
        yPos += 5;
    });

            // --- SEZIONE NOTE FINALI ---
    const noteGeneraliField = document.getElementById('note-generali');
    if (noteGeneraliField && noteGeneraliField.textContent.trim() !== "") {
        yPos += 10;
        if (yPos > 270) { doc.addPage(); yPos = 20; }

        doc.setDrawColor(180, 190, 200);
doc.setLineWidth(0.5);
doc.line(margin, yPos - 2, pageWidth - margin, yPos - 2);

doc.setFont("helvetica", "bold");
doc.setFontSize(11);
doc.setTextColor(21, 101, 192);
doc.text("NOTE AGGIUNTIVE:", margin, yPos + 4);
yPos += 12;

        doc.setFontSize(10);
        yPos = stampaTestoInline(doc, noteGeneraliField, margin + 5, yPos, contentWidth - 10);
    }

    // NOME FILE SICURO: Rimuove caratteri speciali come / che bloccano il salvataggio
    const nomePulito = (dataAdunanza || "documento").replace(/[/\\?%*:|"<>]/g, '-');
    doc.save(`Verbale_Adunanza_${nomePulito}.pdf`);
}

    const url = prompt("Inserisci il link (es. https://jw.org):", "https://");
    if (url) {
        document.execCommand('createLink', false, url);
        ripristinaFocus();
    }
}

function mostraToolbar(el) {
    const toolbar = el.nextElementSibling;
    if (toolbar) toolbar.style.display = 'flex';
}
function nascondiToolbar(el) {
    const toolbar = el.nextElementSibling;
    if (toolbar) setTimeout(() => { toolbar.style.display = 'none'; }, 200);
}

// Funzione d'appoggio per non perdere il cursore dopo aver cliccato un bottone
function ripristinaFocus() {
    const selezione = window.getSelection();
    if (selezione.rangeCount > 0) {
        const range = selezione.getRangeAt(0);
        const area = range.commonAncestorContainer.parentElement.closest('[contenteditable="true"]');
        if (area) area.focus();
    }
}


function stampaTestoInline(doc, element, xStart, yStart, maxWidth) {
    let currentX = xStart;
    let currentY = yStart;
    const lineHeight = 5.5;

    function getStile(nodo) {
        let isBold = false, isItalic = false, isUnderline = false, isLink = false, linkHref = '';
        let colorRgb = [0, 0, 0];
        let el = nodo.parentElement;
        while (el) {
            const tag = el.tagName;
            if (tag === 'B' || tag === 'STRONG') isBold = true;
            if (tag === 'I' || tag === 'EM') isItalic = true;
            if (tag === 'U') isUnderline = true;
            if (tag === 'A') { isLink = true; linkHref = el.getAttribute('href') || ''; }
            if (tag === 'FONT' && el.getAttribute('color')) {
                const hex = el.getAttribute('color');
                const r = parseInt(hex.slice(1,3), 16);
                const g = parseInt(hex.slice(3,5), 16);
                const b = parseInt(hex.slice(5,7), 16);
                if (!isNaN(r)) colorRgb = [r, g, b];
            }
            if (el.style) {
                if (el.style.color) {
                    const m = el.style.color.match(/\d+/g);
                    if (m && m.length >= 3) colorRgb = [parseInt(m[0]), parseInt(m[1]), parseInt(m[2])];
                }
                if (el.style.fontWeight === 'bold' || el.style.fontWeight === '700'
                    || parseInt(el.style.fontWeight) >= 700) isBold = true;
                if (el.style.fontStyle === 'italic') isItalic = true;
                if (el.style.textDecoration && el.style.textDecoration.includes('underline')) isUnderline = true;
                if (el.style.textDecorationLine && el.style.textDecorationLine.includes('underline')) isUnderline = true;
            }
            if (el === element) break;
            el = el.parentElement;
        }
        return { isBold, isItalic, isUnderline, isLink, linkHref, colorRgb };
    }
    function stampaParola(testo, stile) {
        if (!testo || testo === '') return;

        let fStyle = 'normal';
        if (stile.isBold && stile.isItalic) fStyle = 'bolditalic';
        else if (stile.isBold) fStyle = 'bold';
        else if (stile.isItalic) fStyle = 'italic';

        doc.setFont('helvetica', fStyle);
        doc.setTextColor(stile.colorRgb[0], stile.colorRgb[1], stile.colorRgb[2]);

        const pWidth = doc.getTextWidth(testo);

        if (currentX + pWidth > xStart + maxWidth) {
            currentX = xStart;
            currentY += lineHeight;
            if (currentY > 280) { doc.addPage(); currentY = 20; }
        }

        doc.text(testo, currentX, currentY);

        if (stile.isUnderline || stile.isLink) {
            doc.setLineWidth(0.2);
            const lc = stile.isLink ? [25,100,192] : stile.colorRgb;
            doc.setDrawColor(lc[0], lc[1], lc[2]);
            doc.line(currentX, currentY + 0.7, currentX + pWidth, currentY + 0.7);
        }
        if (stile.isLink && stile.linkHref) {
            doc.link(currentX, currentY - 4, pWidth, 5, { url: stile.linkHref });
        }

        currentX += pWidth;
    }

    function processaNodo(nodo) {
        if (nodo.nodeType === 3) { // Nodo testo
            const testo = nodo.textContent;
            if (!testo) return;
            const stile = getStile(nodo);
            // Divide in parole mantenendo gli spazi
            const parti = testo.split(/(\s+)/);
            parti.forEach(parte => {
                if (parte === '') return;
                if (/^\s+$/.test(parte)) {
                    // Spazio: avanza X solo se non siamo a inizio riga
                    if (currentX > xStart) {
                        const spWidth = doc.getTextWidth(' ');
                        currentX += spWidth;
                        if (currentX > xStart + maxWidth) {
                            currentX = xStart;
                            currentY += lineHeight;
                        }
                    }
                } else {
                    stampaParola(parte, stile);
                }
            });
        } else if (nodo.nodeName === 'BR') {
            currentX = xStart;
            currentY += lineHeight;
        } else if (nodo.nodeName === 'TABLE') {
            currentX = xStart;
            doc.autoTable({
                html: nodo,
                startY: currentY + 2,
                margin: { left: xStart },
                tableWidth: maxWidth,
                theme: 'grid',
                styles: { fontSize: 8, cellPadding: 2 },
                headStyles: { fillColor: [240, 242, 245], fontStyle: 'bold' },
            didParseCell: function(data) {
                                const raw = data.cell.raw;
                                if (!raw || typeof raw.querySelector !== 'function') return;
                                const hasBold = raw.querySelector('b, strong');
                                const hasItalic = raw.querySelector('i, em');
                                if (hasBold && hasItalic) data.cell.styles.fontStyle = 'bolditalic';
                                else if (hasBold) data.cell.styles.fontStyle = 'bold';
                                else if (hasItalic) data.cell.styles.fontStyle = 'italic';
                                const fontTag = raw.querySelector('font[color]');
                                if (fontTag) {
                                    const hex = fontTag.getAttribute('color');
                                    const r = parseInt(hex.slice(1,3), 16);
                                    const g = parseInt(hex.slice(3,5), 16);
                                    const b = parseInt(hex.slice(5,7), 16);
                                    if (!isNaN(r)) data.cell.styles.textColor = [r, g, b];
                                } else if (raw.style && raw.style.color) {
                                    const m = raw.style.color.match(/\d+/g);
                                    if (m) data.cell.styles.textColor = [parseInt(m[0]), parseInt(m[1]), parseInt(m[2])];
                                }
                            },
                            didDrawCell: function(data) {
                                const raw = data.cell.raw;
                                if (!raw || typeof raw.querySelector !== 'function') return;
                                if (raw.querySelector('u')) {
                                    const x = data.cell.x + data.cell.padding('left');
                                    const cellH = data.row.height;
                                    const y = data.cell.y + cellH - data.cell.padding('bottom') - 0.5;
                                    const w = data.cell.width - data.cell.padding('left') - data.cell.padding('right');
                                    // Colore sottolineatura uguale al testo
                                    const fontTag2 = raw.querySelector('font[color]');
                                    if (fontTag2) {
                                        const hex2 = fontTag2.getAttribute('color');
                                        doc.setDrawColor(parseInt(hex2.slice(1,3),16), parseInt(hex2.slice(3,5),16), parseInt(hex2.slice(5,7),16));
                                    } else {
                                        doc.setDrawColor(0, 0, 0);
                                    }
                                    doc.setLineWidth(0.2);
                                    doc.line(x, textY, x + w, textY);
                                }
                                const linkTag = raw.querySelector('a[href]');
                                if (linkTag) {
                                    const x = data.cell.x + data.cell.padding('left');
                                    const y = data.cell.y + data.cell.padding('top');
                                    const w = data.cell.width - data.cell.padding('left') - data.cell.padding('right');
                                    const h = data.row.height - data.cell.padding('top') - data.cell.padding('bottom');
                                    doc.link(x, y, w, h, { url: linkTag.getAttribute('href') });
                                }
                            }
            });
            currentY = doc.lastAutoTable.finalY + lineHeight;
            currentX = xStart;
       } else {
            // Vai a capo PRIMA del contenuto se è un blocco (tranne il primo)
            const tag = nodo.nodeName;
            const isBlock = (tag === 'DIV' || tag === 'P' || tag === 'LI');
            if (isBlock && currentX > xStart) {
                currentX = xStart;
                currentY += lineHeight;
            }
            // Ricorsione sui figli
            Array.from(nodo.childNodes).forEach(processaNodo);
            // Vai a capo DOPO il contenuto se è un blocco
            if (isBlock) {
                currentX = xStart;
                currentY += lineHeight;
            }
        }
    }

    Array.from(element.childNodes).forEach(processaNodo);
    return currentY + lineHeight;
}
</script>
